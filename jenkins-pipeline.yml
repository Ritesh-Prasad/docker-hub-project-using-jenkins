pipeline{
    agent any
    tools{
        maven 'maven'
    }
    stages{
        stage('code'){
            steps{
                git branch: '$branch', url: 'https://github.com/RAHAMSHAIK007/jenkins-java-project.git'
            }
        }
        stage('Build'){
            steps{
                sh 'mvn compile'
            }
        }
        stage('Test'){
            steps{
                sh 'mvn test'
            }
        }
        stage('Artifacts'){
            steps{
                sh 'mvn package'
            }
        }
        stage('build image'){
            steps{
                sh 'docker build -t netflix1 .'
            }
        }
        stage('Tag & Push'){
            steps{
                withDockerRegistry(credentialsId: 'dockerhub', url: 'https://index.docker.io/v1/') {
                    sh 'docker tag netflix1 riteshprasad07/netflixproject01:latest'
                    sh 'docker push riteshprasad07/netflixproject01:latest'
                }
            }
        }
        stage('pull the image'){
            steps{
                sh 'docker pull riteshprasad07/netflixproject01:latest'
            }
        }
        stage('run the container'){
            steps{
                sh 'docker run -d --name cont2 -p 8180:8080 riteshprasad07/netflixproject01:latest'
            }
        }
    }
}
